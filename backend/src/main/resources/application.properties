spring.application.name=rhhub-app
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Personalizar
app.seeder.enabled=${APP_SEEDER_ENABLED:false}

# Configuración JWT
app.jwt.secret-key=${APP_JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
#; 15 minutos en milisegundos por defecto (15*60*1000)
app.jwt.expiration-time=${APP_JWT_EXPIRATION_TIME:900000} 
#; 30 días en milisegundos por defecto (30*24*60*60*1000)
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:2592000000}

# Configuración Cookie 
app.cookie.refresh-token.name=${APP_COOKIE_REFRESH_TOKEN_NAME:renovar_token}
#; 30 días en segundos por defecto (30*24*60*60)
app.cookie.refresh-token.max-age=${APP_COOKIE_REFRESH_TOKEN_MAXAGE:2592000}
app.cookie.refresh-token.path=/api/v1/autenticacion
app.cookie.refresh-token.http-only=${APP_COOKIE_REFRESH_TOKEN_HTTPONLY:true}
app.cookie.refresh-token.secure=${APP_COOKIE_REFRESH_TOKEN_SECURE:true}
app.cookie.refresh-token.same-site=${APP_COOKIE_REFRESH_TOKEN_SAMESITE:Strict}

# Definir CORS global
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
app.cors.path-pattern=${APP_CORS_PATH_PATTERN:/**}